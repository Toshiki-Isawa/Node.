name: Node
options:
  bundleIdPrefix: app.node
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  developmentLanguage: ja
  knownRegions:
    - ja
    - en
    - Base

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Node/Config/Secrets.xcconfig
  Release: Node/Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  Node:
    type: application
    platform: iOS
    sources:
      - path: Node
        excludes:
          - Config/Secrets.example.xcconfig
    resources:
      - path: Node/Resources/privacy.html
    configFiles:
      Debug: Node/Config/Secrets.xcconfig
      Release: Node/Config/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.node.ios
        INFOPLIST_KEY_CFBundleDisplayName: Node.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # iPad はマルチタスク (Split View) を有効にするため UIRequiresFullScreen は設定しない。
        # その条件下では Apple のガイドライン上 iPad は全 4 方向の対応が必須。
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "観測写真を撮影するためにカメラへのアクセスが必要です。"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "タイムラプスを写真ライブラリに保存するために必要です。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "観測写真を保存・共有するために必要です。"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Node/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: PostHog
        product: PostHog
    # v1.0: Sign in with Apple は Personal Team 実機 QA のため未設定。v1.1 で cloudSync 有効化時に復元。
    entitlements:
      path: Node/Node.entitlements

schemes:
  Node:
    build:
      targets:
        Node: all
    run:
      config: Debug
      storeKitConfiguration: Node/Config/Products.storekit
