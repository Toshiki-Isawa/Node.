# A string used to distinguish logs from different Supabase projects.
project_id = "node-app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["app.node.ios://auth-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.external.apple]
enabled = true
client_id = "app.node.ios"
# ネイティブ Sign In（iOS SDK）のみ。OAuth Secret は不要
secret = ""

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
skip_nonce_check = true

[functions.r2-presign-upload]
verify_jwt = true

[functions.r2-presign-download]
verify_jwt = true

[functions.delete-account]
verify_jwt = true
