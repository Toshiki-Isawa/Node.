<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 24px; min-height: 152px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid var(--hairline); border-radius: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 999px; flex: none; }
  .name { font-family: var(--font-text); font-size: 12px; color: var(--c-bone); }
  .desc { font-family: var(--font-mono); font-size: 10px; color: var(--c-mist); letter-spacing: 0.04em; text-transform: uppercase; }
  .col { display: flex; flex-direction: column; gap: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">SYNC STATE · 同期状態</div>
    <div class="grid">
      <div class="row"><span class="dot" style="background: var(--c-sync-local);"></span><div class="col"><span class="name">ローカルのみ</span><span class="desc">local_only</span></div></div>
      <div class="row"><span class="dot" style="background: var(--c-sync-active); box-shadow: 0 0 0 4px color-mix(in oklab, var(--c-sync-active) 25%, transparent);"></span><div class="col"><span class="name">同期中</span><span class="desc">syncing</span></div></div>
      <div class="row"><span class="dot" style="background: var(--c-sync-done);"></span><div class="col"><span class="name">同期済み</span><span class="desc">synced</span></div></div>
      <div class="row"><span class="dot" style="background: var(--c-sync-fail);"></span><div class="col"><span class="name">同期失敗</span><span class="desc">failed</span></div></div>
    </div>
  </div>
</body>
</html>
