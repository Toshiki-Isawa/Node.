<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 28px; min-height: 320px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .compare { display: grid; grid-template-columns: 1fr 1px 1fr; align-items: stretch; background: var(--c-charcoal); border-radius: 14px; overflow: hidden; border: 1px solid var(--hairline); }
  .pane { aspect-ratio: 4/3; position: relative; }
  .pane .photo { position: absolute; inset: 0; }
  .a .photo { background: radial-gradient(120% 80% at 30% 30%, oklch(0.32 0.03 130) 0%, oklch(0.16 0.005 130) 70%); }
  .b .photo { background: radial-gradient(120% 80% at 60% 50%, oklch(0.48 0.05 130) 0%, oklch(0.2 0.01 130) 70%); }
  .pane .tag { position: absolute; top: 14px; left: 14px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-bone); background: color-mix(in oklab, var(--c-void) 65%, transparent); padding: 4px 8px; border-radius: 999px; backdrop-filter: blur(8px); }
  .pane .date { position: absolute; left: 14px; bottom: 12px; font-family: var(--font-display); font-size: 17px; font-weight: 300; color: var(--c-bone); letter-spacing: -0.01em; }
  .pane .day  { position: absolute; left: 14px; bottom: 32px; font-family: var(--font-mono); font-size: 9px; color: var(--c-fog); letter-spacing: 0.06em; text-transform: uppercase; }
  .divider { background: var(--c-stone); }
  .footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 14px; }
  .interval { font-family: var(--font-display); font-size: 17px; color: var(--c-bone); letter-spacing: -0.01em; font-weight: 300; }
  .arrow { color: var(--c-moss); margin: 0 8px; }
  .delta { font-family: var(--font-mono); font-size: 10px; color: var(--c-fog); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">比較 · 前 / 後</div>
    <div class="compare">
      <div class="pane a">
        <div class="photo"></div>
        <div class="tag">前</div>
        <div class="day">1日目</div>
        <div class="date">1月3日</div>
      </div>
      <div class="divider"></div>
      <div class="pane b">
        <div class="photo"></div>
        <div class="tag">後</div>
        <div class="day">142日目</div>
        <div class="date">5月24日</div>
      </div>
    </div>
    <div class="footer">
      <span class="interval">1日目 <span class="arrow">→</span> 142日目</span>
      <span class="delta">+141日 · +18観測</span>
    </div>
  </div>
</body>
</html>
