<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 32px; min-height: 320px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: baseline; gap: 24px; }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-mist); min-width: 80px; }
  .specimen { color: var(--c-bone); }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="tag">display·56·300</span>
      <span class="specimen" style="font-family: var(--font-display); font-size: 56px; font-weight: 300; letter-spacing: -0.025em; line-height: 1;">Node.</span>
    </div>
    <div class="row">
      <span class="tag">display·40·300</span>
      <span class="specimen" style="font-family: var(--font-display); font-size: 40px; font-weight: 300; letter-spacing: -0.025em; line-height: 1;">植物の時間を残す</span>
    </div>
    <div class="row">
      <span class="tag">title 1·28·400</span>
      <span class="specimen" style="font-family: var(--font-display); font-size: 28px; font-weight: 400; letter-spacing: -0.01em;">アガベ チタノタ</span>
    </div>
    <div class="row">
      <span class="tag">title 2·22·400</span>
      <span class="specimen" style="font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: -0.01em;">1日目 → 142日目</span>
    </div>
  </div>
</body>
</html>
