<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 32px; min-height: 280px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: baseline; gap: 24px; }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-mist); min-width: 88px; }
  .specimen { color: var(--c-paper); }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="tag">title 3·17·600</span>
      <span class="specimen" style="font-family: var(--font-text); font-size: 17px; font-weight: 600; color: var(--c-bone);">今日の観測</span>
    </div>
    <div class="row">
      <span class="tag">body·15·400</span>
      <span class="specimen" style="font-family: var(--font-text); font-size: 15px; font-weight: 400; line-height: 1.45;">新しい棘が3本展開。中央の葉に薄い斑が確認できる。</span>
    </div>
    <div class="row">
      <span class="tag">callout·14·500</span>
      <span class="specimen" style="font-family: var(--font-text); font-size: 14px; font-weight: 500;">水やり · 200ml</span>
    </div>
    <div class="row">
      <span class="tag">caption·12·400</span>
      <span class="specimen caption" style="font-size: 12px;">2026年5月24日 水 · 19:42 JST</span>
    </div>
    <div class="row">
      <span class="tag">meta·10·mono</span>
      <span class="meta">観測 · 142 · 同期済み</span>
    </div>
  </div>
</body>
</html>
