<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 28px 32px; min-height: 240px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; background: var(--c-void); }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-mist); }
  .quote { font-family: var(--font-display); font-size: 42px; font-weight: 300; line-height: 1.05; letter-spacing: -0.025em; color: var(--c-bone); max-width: 700px; }
  .sub { font-family: var(--font-text); font-size: 14px; color: var(--c-fog); max-width: 600px; }
  .accent { color: var(--c-moss); }
</style>
</head>
<body>
  <div class="card">
    <div class="label">タグライン · 静かに、言い切る</div>
    <div class="quote">植物の時間を残す<span class="accent">.</span></div>
    <div class="sub">ノードとは、植物が成長する点。そして、それを記録する点。</div>
  </div>
</body>
</html>
