<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 28px; min-height: 200px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--c-moss); width: 28px; border-radius: 2px; opacity: 0.85; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--c-fog); }
  .val  { font-family: var(--font-mono); font-size: 9px; color: var(--c-mist); }
</style>
</head>
<body>
  <div class="card">
    <div class="label">スペーシング · 4PX 基本</div>
    <div class="scale">
      <div class="token"><div class="box" style="height:4px;"></div><div class="name">1</div><div class="val">4</div></div>
      <div class="token"><div class="box" style="height:8px;"></div><div class="name">2</div><div class="val">8</div></div>
      <div class="token"><div class="box" style="height:12px;"></div><div class="name">3</div><div class="val">12</div></div>
      <div class="token"><div class="box" style="height:16px;"></div><div class="name">4</div><div class="val">16</div></div>
      <div class="token"><div class="box" style="height:20px;"></div><div class="name">5</div><div class="val">20</div></div>
      <div class="token"><div class="box" style="height:24px;"></div><div class="name">6</div><div class="val">24</div></div>
      <div class="token"><div class="box" style="height:32px;"></div><div class="name">8</div><div class="val">32</div></div>
      <div class="token"><div class="box" style="height:40px;"></div><div class="name">10</div><div class="val">40</div></div>
      <div class="token"><div class="box" style="height:48px;"></div><div class="name">12</div><div class="val">48</div></div>
      <div class="token"><div class="box" style="height:64px;"></div><div class="name">16</div><div class="val">64</div></div>
      <div class="token"><div class="box" style="height:80px;"></div><div class="name">20</div><div class="val">80</div></div>
    </div>
  </div>
</body>
</html>
