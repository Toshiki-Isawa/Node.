<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 28px; min-height: 320px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: stretch; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .obs { position: relative; aspect-ratio: 3/4; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-photo); }
  .obs .photo { position: absolute; inset: 0; background:
    radial-gradient(120% 80% at 30% 20%, oklch(0.5 0.04 130) 0%, oklch(0.18 0.01 130) 70%);
  }
  .obs .grain { position: absolute; inset: 0; opacity: 0.08; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.6'/></svg>"); }
  .obs .grad { position: absolute; inset: 0; background: linear-gradient(to top, oklch(0.12 0.005 130 / 0.85) 0%, transparent 50%); }
  .obs .meta { position: absolute; left: 14px; right: 14px; bottom: 12px; display: flex; justify-content: space-between; align-items: end; }
  .obs .date { font-family: var(--font-display); font-size: 22px; font-weight: 300; letter-spacing: -0.02em; color: var(--c-bone); line-height: 1; }
  .obs .day  { font-family: var(--font-mono); font-size: 10px; color: var(--c-fog); letter-spacing: 0.06em; text-transform: uppercase; }
  .obs .sync { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; background: color-mix(in oklab, var(--c-void) 60%, transparent); backdrop-filter: blur(8px); padding: 5px 9px; border-radius: 999px; }
  .obs .sync .dot { width: 5px; height: 5px; border-radius: 999px; background: var(--c-moss); }
  .obs .sync .txt { font-family: var(--font-mono); font-size: 9px; color: var(--c-bone); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card">
    <div class="col">
      <div class="label">写真カード · 観測</div>
      <div class="obs">
        <div class="photo"></div>
        <div class="grain"></div>
        <div class="grad"></div>
        <div class="sync"><span class="dot"></span><span class="txt">同期済み</span></div>
        <div class="meta">
          <div>
            <div class="date">5月24日</div>
            <div class="day" style="margin-top: 4px;">142日目 · 19:42</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="label">写真カード · ローカルのみ</div>
      <div class="obs">
        <div class="photo" style="background: radial-gradient(120% 80% at 60% 60%, oklch(0.4 0.04 120) 0%, oklch(0.15 0.01 130) 70%);"></div>
        <div class="grain"></div>
        <div class="grad"></div>
        <div class="sync"><span class="dot" style="background: var(--c-olive);"></span><span class="txt">ローカル</span></div>
        <div class="meta">
          <div>
            <div class="date">5月23日</div>
            <div class="day" style="margin-top: 4px;">141日目 · 08:14</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
