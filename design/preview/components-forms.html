<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 24px; min-height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .field { background: var(--c-charcoal); border: 1px solid var(--hairline); border-radius: 14px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; transition: border-color var(--dur-base) var(--ease-quiet); }
  .field:focus-within { border-color: var(--c-moss); }
  .field .key { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--c-mist); }
  .field input, .field textarea { background: transparent; border: 0; outline: 0; color: var(--c-bone); font-family: var(--font-text); font-size: 15px; padding: 0; resize: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--c-charcoal); border-radius: 14px; }
  .toggle .lbl { color: var(--c-bone); font-size: 14px; }
  .switch { width: 40px; height: 24px; background: var(--c-moss); border-radius: 999px; position: relative; }
  .switch::after { content: ""; position: absolute; top: 2px; left: 18px; width: 20px; height: 20px; border-radius: 999px; background: var(--c-bone); }
  .switch.off { background: var(--c-stone); }
  .switch.off::after { left: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">フォーム · 入力 · トグル</div>
    <div class="row">
      <div class="field"><span class="key">植物名</span><input value="アガベ チタノタ 'FO-076'" /></div>
      <div class="field"><span class="key">入手日</span><input value="2025-04-12" /></div>
    </div>
    <div class="field"><span class="key">メモ</span><textarea rows="2">新しい棘が3本展開。中央の葉に薄い斑。</textarea></div>
    <div class="row">
      <div class="toggle"><span class="lbl">原画質で保存</span><span class="switch"></span></div>
      <div class="toggle"><span class="lbl">自動同期</span><span class="switch off"></span></div>
    </div>
  </div>
</body>
</html>
