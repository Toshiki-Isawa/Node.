<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 24px; min-height: 152px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.6 / 1; border-radius: 8px; border: 1px solid var(--hairline); }
  .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-fog); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--c-mist); }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .axis { font-family: var(--font-text); font-size: 12px; color: var(--c-fog); font-style: italic; }
</style>
</head>
<body>
  <div class="card">
    <div style="display:flex; justify-content: space-between; align-items: baseline;">
      <div class="label">ボタニカルアクセント</div>
      <div class="axis">single green axis · chroma ≈ 0.05</div>
    </div>
    <div class="swatches">
      <div class="swatch"><div class="chip" style="background: var(--c-moss-deep);"></div><div class="name">Moss Deep</div><div class="hex">押下時</div></div>
      <div class="swatch"><div class="chip" style="background: var(--c-moss);"></div><div class="name">Moss</div><div class="hex">プライマリ</div></div>
      <div class="swatch"><div class="chip" style="background: var(--c-moss-soft);"></div><div class="name">Moss Soft</div><div class="hex">淡い下地</div></div>
      <div class="swatch"><div class="chip" style="background: var(--c-olive);"></div><div class="name">Olive</div><div class="hex">セカンダリ</div></div>
      <div class="swatch"><div class="chip" style="background: var(--c-sage);"></div><div class="name">Sage</div><div class="hex">ミュート</div></div>
    </div>
  </div>
</body>
</html>
