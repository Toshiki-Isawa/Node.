<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { padding: 28px; min-height: 220px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--c-mist); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; align-items: end; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .glyph { width: 28px; height: 28px; color: var(--c-bone); }
  .name { font-family: var(--font-mono); font-size: 9px; color: var(--c-mist); letter-spacing: 0.06em; text-transform: uppercase; }
  .strokes { display: flex; gap: 24px; align-items: end; }
  .stk { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stk .g { width: 22px; height: 22px; color: var(--c-bone); }
  .stk .sz { font-family: var(--font-mono); font-size: 9px; color: var(--c-mist); letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">アイコノグラフィ · LUCIDE · ストローク 1.5 · 塗りつぶし不可</div>
    <div class="row">
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 9.5L12 3l9 6.5V21H3z"/></svg><div class="name">ホーム</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="4"/><rect x="3" y="6" width="18" height="14" rx="2"/></svg><div class="name">カメラ</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 6h16M4 12h10M4 18h16"/></svg><div class="name">リスト</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div class="name">時計</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg><div class="name">グリッド</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 12a9 9 0 11-3.5-7.1"/><path d="M21 4v5h-5"/></svg><div class="name">同期</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2v6M12 22v-6M2 12h6M22 12h-6"/><circle cx="12" cy="12" r="3"/></svg><div class="name">比較</div></div>
      <div class="ic"><svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 4v16M17 4v16M3 8h4M3 12h4M3 16h4M17 8h4M17 12h4M17 16h4M8 8h8v8H8z"/></svg><div class="name">タイムラプス</div></div>
    </div>

    <div class="label">サイズスケール</div>
    <div class="strokes">
      <div class="stk"><svg class="g" style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="4"/><rect x="3" y="6" width="18" height="14" rx="2"/></svg><div class="sz">16 · メタ</div></div>
      <div class="stk"><svg class="g" style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="4"/><rect x="3" y="6" width="18" height="14" rx="2"/></svg><div class="sz">20 · 標準</div></div>
      <div class="stk"><svg class="g" style="width:24px;height:24px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="4"/><rect x="3" y="6" width="18" height="14" rx="2"/></svg><div class="sz">24 · 主動作</div></div>
      <div class="stk"><svg class="g" style="width:32px;height:32px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="13" r="4"/><rect x="3" y="6" width="18" height="14" rx="2"/></svg><div class="sz">32 · ヒーロー</div></div>
    </div>
  </div>
</body>
</html>
